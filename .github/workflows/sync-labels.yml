name: Sync Labels
on:
  push:
    branches: [main]
    paths:
      - .github/labels.yml
  workflow_dispatch:

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          token: ${{ secrets.BSU_PROJECT_TOKEN }}
          delete-other-labels: true
