name: Add Issue to Project
on:
  issues:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/TrevorWT/projects/2
          github-token: ${{ secrets.PROJECT_TOKEN }}
